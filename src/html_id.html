<!DOCTYPE html>
<html>
<head>
<style>
#myHeader {
  background-color: lightblue;
  color: black;
  padding: 40px;
  text-align: center;
} 
#content {
 background-color: rgb(189, 230, 173);
  color: black;
  padding: 40px;
  text-align: center;
}
#myfooter {
 background-color: rgb(207, 201, 201);
  color: black;
  padding: 40px;
  text-align: center;
  margin-top:5px;
}
</style>
</head>
<body>

<h2>The id Attribute</h2>
<p>Use CSS to style an element with the id "myHeader":</p>

<h1 id="myHeader">My Header</h1>
<main>
  <div id="content">This is my content</div>
</main>
<footer>
  <div id="myfooter">
    This is my footer content
  </div>
</footer>
</body>
</html>
