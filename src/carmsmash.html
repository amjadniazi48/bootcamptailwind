<!DOCTYPE html>
<html>
<head>
<style>

body{
    font-family:Arial;
}

.road{
    width:800px;
    height:120px;
    border:2px solid black;
    margin:40px auto;
    position:relative;
    overflow:hidden;
    background:#f5f5f5;
}

/* Cars */

.car1,
.car2{
    width:80px;
    height:40px;
    position:absolute;
    top:40px;
    font-size:45px;
}

.car1{
    left:0;
    animation:leftCar 0.5s forwards;
}

.car2{
    right:0;
    animation:rightCar 0.5s forwards;
}

/* Smash */

.smash{
    position:absolute;
    left:50%;
    top:30px;
    transform:translateX(-50%);
    font-size:50px;
    opacity:0;

    animation:boom 1s forwards;
}

/* Left Car */

@keyframes leftCar{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(360px);
    }

}

/* Right Car */

@keyframes rightCar{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-360px);
    }

}

/* Explosion */

@keyframes boom{

    0%,80%{
        opacity:0;
        transform:translateX(-50%) scale(0);
    }

    100%{
        opacity:1;
        transform:translateX(-50%) scale(1.5);
    }

}

</style>
</head>

<body>

<h2>Cars Crash Animation</h2>

<div class="road">

    <div class="car1">🚗</div>

    <div class="car2">🚙</div>

    <div class="smash">💥</div>

</div>

</body>
</html>
