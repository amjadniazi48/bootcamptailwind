<!DOCTYPE html>
<html>
<head>

<style>

circle{
    transform-origin:center;
    animation: grow 2s infinite alternate;
}

@keyframes grow{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(2);
    }

}

</style>

</head>

<body>

<svg width="300" height="300" style="border:2px solid black;">

    <circle
        cx="150"
        cy="150"
        r="50"
        fill="red"/>

</svg>

</body>
</html>
