<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Flex Grow Example</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-200 p-10">

    <h1 class="text-3xl font-bold mb-6">
        Flex Grow Example
    </h1>

    <div class="w-[700px] border bg-white p-4">

        <div class="flex gap-2">

            <div class="grow bg-red-400 p-4 text-center m-2">
                1
            </div>

            <div class="grow-[2] bg-blue-400 p-4 text-center m-2">
                2
            </div>

            <div class="grow bg-yellow-300 p-4 text-center m-2">
                3
            </div>

            <div class="grow-[3] bg-pink-400 p-4 text-center m-2">
                4
            </div>
             <div class="grow-[3] bg-red-400 p-4 text-center m-2">
                5
            </div>

        </div>

    </div>

</body>
</html>
