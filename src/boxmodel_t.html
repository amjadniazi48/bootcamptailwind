<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Box Model</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-200 p-10">

    <h1 class="text-3xl font-bold mb-6">CSS Box Model</h1>

    <!-- Parent Container -->
      <div class="w-[700px] border-4 border-black bg-white p-4">

        <!-- Box 1 -->
        <div class="border-4 border-red-600 p-2 m-4 bg-red-200">
            Box 1 (Padding = p-2, Margin = m-4)
        </div>

        <!-- Box 2 -->
        <div class="border-4 border-blue-600 p-2 m-4 bg-blue-200">
            Box 2 (Padding = p-2, Margin = m-4)
        </div>

    </div>

</body>
</html>
